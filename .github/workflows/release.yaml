name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build and zip (Chrome)
        run: pnpm zip

      - name: Build and zip (Firefox)
        run: pnpm zip:firefox

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.zip
          generate_release_notes: true